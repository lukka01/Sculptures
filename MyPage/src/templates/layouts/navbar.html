{% from "macros.html" import is_active %}
<nav class="navbar navbar-expand-lg bg-body-tertiary border-body mb-3" data-bs-theme="light">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">ნავიგაცია:</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <li class="nav-item">
          <a class="nav-link {{ is_active('main.home') }}" href="{{ url_for('main.home') }}">მთავარი</a>
        </li>

        <li class="nav-item">
          <a class="nav-link {{ is_active('main.about') }}" href="{{ url_for('main.about') }}">ჩვენს შესახებ</a>
        </li>

        <li class="nav-item">
          <a class="nav-link {{ is_active('auth.register') }}" href="{{ url_for('auth.register') }}">რეგისტრაცია</a>
        </li>

      </ul>
      <div class="d-flex btn-group" role="search">
        {% if current_user.is_authenticated %}
            <a class="btn btn-danger" href="{{ url_for('auth.logout') }}">logout</a>
        {% else %}
            <a class="btn btn-success" href="{{ url_for('auth.login') }}">login</a>
            <a class="btn btn-outline-success" href="{{ url_for('auth.register') }}">register</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>
